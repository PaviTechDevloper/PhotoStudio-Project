apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: pavi-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: shubha20/photostudio:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-config
---

apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: pavi-ns
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: LoadBalancer

